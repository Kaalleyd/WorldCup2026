function fmtD(d){return new Date(d+"T12:00:00Z").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});}
function fmtDs(d){return new Date(d+"T12:00:00Z").toLocaleDateString("fr-FR",{day:"numeric",month:"short"});}
function getScorers(ms){
  const m={};
  ms.forEach(x=>(x.g||[]).forEach(g=>{
    if(!g.n||g.n.toLowerCase().includes("og"))return;
    const t=g.s==="H"?x.h:x.a,k=g.n+"||"+t;
    if(!m[k])m[k]={name:g.n,team:t,goals:0};
    m[k].goals++;
  }));
  return Object.values(m).sort((a,b)=>b.goals-a.goals);
}
function gStr(arr){
  return arr.filter(g=>g.s||g.m||g.n).map(g=>{
    const conf = g.c===0 ? " ⚠" : "";
    if(g.n&&g.m) return g.n+" "+g.m+"'"+conf;
    if(g.n)      return g.n+conf;
    if(g.m)      return g.m+"'"+conf;
    return "⚽";
  });
}
