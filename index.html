// ── REFRESH (3 sources : /api/scores ESPN serveur + live.json buteurs) ────────
async function doRefresh(){
  setState({loading:true,err:null});
  try{
    // 1. /api/scores → Vercel serverless → ESPN côté serveur (vrai temps réel)
    var liveMap={};
    try{
      var r1=await fetch("/api/scores");
      if(r1.ok){
        var d1=await r1.json();
        (d1.matches||[]).forEach(function(m){liveMap[m.h+"|"+m.a]={hs:m.hs,as:m.as,st:m.st,g:m.g||[]};});
      }
    }catch(ignore){}
    // 2. live.json → buteurs + classements (fichier statique du repo)
    var parsed=null;
    try{
      var r2=await fetch("/live.json");
      if(r2.ok)parsed=await r2.json();
    }catch(ignore){}
    // 3. Fusion : base = INIT, mise à jour sélective, aucun match perdu
    var liveByKey={};
    if(parsed&&Array.isArray(parsed.matches)){
      parsed.matches.forEach(function(m){liveByKey[m.h+"|"+m.a]=m;});
    }
    state.matches=state.matches.map(function(m){
      var key=m.h+"|"+m.a,lm=liveByKey[key],espn=liveMap[key];
      var r=Object.assign({},m);
      // live.json : scores + buteurs de secours
      if(lm){
        if(lm.hs!==undefined)r.hs=lm.hs;
        if(lm.as!==undefined)r.as=lm.as;
        if(lm.st)r.st=lm.st;
        if(lm.d)r.d=lm.d;
        if(lm.gr)r.gr=lm.gr;
        if(Array.isArray(lm.g)&&lm.g.length>0)r.g=lm.g;
      }
      // ESPN (/api/scores) : priorité pour score/statut ET buteurs auto
      if(espn){
        r.hs=espn.hs;r.as=espn.as;r.st=espn.st;
        if(Array.isArray(espn.g)&&espn.g.length>0)r.g=espn.g;
      }
      return r;
    });
    if(parsed&&Array.isArray(parsed.standings)&&parsed.standings.length>=8){
      var g={};
      parsed.standings.forEach(function(s){if(!g[s.gr])g[s.gr]=[];g[s.gr].push({t:s.t,pts:s.pts,w:s.w,d:s.d,l:s.l});});
      Object.keys(g).forEach(function(k){g[k].sort(function(a,b){return b.pts-a.pts;});});
      if(Object.keys(g).length>=8)state.st=g;
    }
    var lc=Object.values(liveMap).filter(function(u){return u.st==="live";}).length;
    var espnOk=Object.keys(liveMap).length>0;
    setState({loading:false,refreshed:true,
      err:lc>0?"🔴 "+lc+" match(s) en cours":espnOk?"✓ Scores mis à jour (ESPN live)":"✓ Buteurs chargés (ESPN indisponible)"});
  }catch(e){setState({loading:false,err:e.message});}
}

function getScorers(ms){
  var map={};
  ms.forEach(function(x){(x.g||[]).forEach(function(g){
    if(!g.n||g.n.toLowerCase().indexOf("og")>=0)return;
    var t=g.s==="H"?x.h:x.a,k=g.n+"||"+t;
    if(!map[k])map[k]={name:g.n,team:t,goals:0};
    map[k].goals++;
  });});
  return Object.values(map).sort(function(a,b){return b.goals-a.goals;});
}
function gStr(arr){
  return (arr||[]).filter(function(g){return g&&(g.n||g.m);}).map(function(g){
    if(g.n&&g.m)return g.n+" "+g.m+"'";
    if(g.n)return g.n;
    if(g.m)return g.m+"'";
    return "";

}
