function getScorers(ms){
  const m={};
  ms.forEach(x=>(x.g||[]).forEach(g=>{
    if(!g.n||g.n.toLowerCase().includes("og"))return;
    const t=g.s==="H"?x.h:x.a,k=g.n+"||"+t;
    if(!m[k])m[k]={name:g.n,team:t,goals:0};
    m[k].goals++;
  }));
  return Object.values(m).sort((a,b)=>b.goals-a.goals);
}

async function doRefresh(){
  setState({loading:true,err:null});
  try{
    const rsp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:"Search FIFA World Cup 2026 latest scores and standings today. Return ONLY valid JSON no markdown: {\"matches\":[{\"h\":\"ESP\",\"a\":\"KSA\",\"hs\":4,\"as\":0,\"st\":\"final\",\"d\":\"2026-06-21\",\"gr\":\"H\",\"g\":[{\"s\":\"H\",\"n\":\"Scorer\",\"m\":10}]}],\"standings\":[{\"gr\":\"A\",\"t\":\"MEX\",\"pts\":6,\"w\":2,\"d\":0,\"l\":0}]}"}]})});
    if(rsp.status===429)throw new Error("Limite API — patientez 1 min");
    if(!rsp.ok)throw new Error("HTTP "+rsp.status);
    const data=await rsp.json();
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    const jm=txt.match(/\{[\s\S]*\}/);
    if(jm){const p=JSON.parse(jm[0]);
      if(p.matches?.length>0)state.matches=p.matches;
      if(p.standings?.length>=8){const g={};p.standings.forEach(s=>{if(!g[s.gr])g[s.gr]=[];g[s.gr].push(s);});Object.keys(g).forEach(k=>g[k].sort((a,b)=>b.pts-a.pts));if(Object.keys(g).length>=8)state.st=g;}
    }
    setState({loading:false,err:null});
  }catch(e){setState({loading:false,err:e.message});}
}

function el(tag,attrs,...kids){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else e.setAttribute(k,v);
  });
  kids.flat(Infinity).forEach(k=>{if(k==null)return;e.appendChild(typeof k==="string"?document.createTextNode(k):k);});
  return e;
}
