// ── Refresh (ESPN live + live.json data) ──────────────────────────────────────
async function doRefresh(){
  setState({loading:true,err:null});
  try{
    // Étape 1 : ESPN sans date → détection LIVE du jour
    var liveMap={};
    try{
      var re=await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard");
      if(re.ok){
        var de=await re.json();
        (de.events||[]).forEach(function(ev){
          var comp=ev.competitions&&ev.competitions[0];
          if(!comp)return;
          var home=comp.competitors&&comp.competitors.find(function(c){return c.homeAway==="home";});
          var away=comp.competitors&&comp.competitors.find(function(c){return c.homeAway==="away";});
          if(!home||!away)return;
          var espnSt=ev.status&&ev.status.type&&ev.status.type.state;
          var st=espnSt==="in"?"live":espnSt==="post"?"final":"scheduled";
          var hc=normCode(home.team.abbreviation),ac=normCode(away.team.abbreviation);
          liveMap[hc+"|"+ac]={hs:st!=="scheduled"?parseInt(home.score)||0:0,as:st!=="scheduled"?parseInt(away.score)||0:0,st:st};
        });
      }
    }catch(e1){}
    // Étape 2 : live.json → buteurs + classements complets
    var parsed=null;
    try{
      var rj=await fetch("https://raw.githubusercontent.com/Kaalleyd/WorldCup2026/master/live.json");
      if(rj.ok)parsed=await rj.json();
    }catch(e2){}
    // Étape 3 : fusion — on part de INIT, on ne supprime jamais de match
    if(parsed&&Array.isArray(parsed.matches)&&parsed.matches.length>0){
      // Indexer live.json par clé h|a
      var liveByKey={};
      parsed.matches.forEach(function(m){liveByKey[m.h+"|"+m.a]=m;});
      // Mettre à jour chaque match existant sans en perdre aucun
      state.matches=state.matches.map(function(m){
        var key=m.h+"|"+m.a;
        var lm=liveByKey[key];
        var espn=liveMap[key];
        var result=Object.assign({},m); // base = match original (préserve t, p, etc.)
        if(lm){
          // Mise à jour sélective depuis live.json
          if(lm.hs!==undefined)result.hs=lm.hs;
          if(lm.as!==undefined)result.as=lm.as;
          if(lm.st)result.st=lm.st;
          if(lm.d)result.d=lm.d;
          if(lm.gr)result.gr=lm.gr;
          if(Array.isArray(lm.g)&&lm.g.length>0)result.g=lm.g;
        }
        if(espn){ // ESPN a priorité pour le statut LIVE
          result.hs=espn.hs;result.as=espn.as;result.st=espn.st;
        }
        return result;
      });
      if(Array.isArray(parsed.standings)&&parsed.standings.length>=8){
        var g={};
        parsed.standings.forEach(function(s){if(!g[s.gr])g[s.gr]=[];g[s.gr].push({t:s.t,pts:s.pts,w:s.w,d:s.d,l:s.l});});
        Object.keys(g).forEach(function(k){g[k].sort(function(a,b){return b.pts-a.pts;});});
        if(Object.keys(g).length>=8)state.st=g;
      }
      var liveCount=Object.values(liveMap).filter(function(u){return u.st==="live";}).length;
      var msg=liveCount>0?"✓ Mis à jour — "+liveCount+" match(s) en cours 🔴 LIVE":"✓ Données mises à jour";
      setState({loading:false,err:msg,refreshed:true});
    } else if(Object.keys(liveMap).length>0){
      state.matches=state.matches.map(function(m){
        var u=liveMap[m.h+"|"+m.a];
        return u?Object.assign({},m,u):m;
      });
      var lc=Object.values(liveMap).filter(function(u){return u.st==="live";}).length;
      setState({loading:false,err:lc>0?"✓ "+lc+" match(s) LIVE 🔴":"✓ Statuts ESPN mis à jour",refreshed:true});
    } else {
      setState({loading:false,err:"Aucune source disponible — réessayez",refreshed:state.refreshed});
    }
  }catch(e){setState({loading:false,err:e.message});}
}

// ── Utilitaires ───────────────────────────────────────────────────────────────
function fmtD(d){return new Date(d+"T12:00:00Z").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});}
function fmtDs(d){return new Date(d+"T12:00:00Z").toLocaleDateString("fr-FR",{day:"numeric",month:"short"});}
function getScorers(ms){
  var map={};
  ms.forEach(function(x){(x.g||[]).forEach(function(g){
    if(!g.n||g.n.toLowerCase().indexOf("og")>=0)return;
    var t=g.s==="H"?x.h:x.a,k=g.n+"||"+t;
    if(!map[k])map[k]={name:g.n,team:t,goals:0};
    map[k].goals++;
  });});

}
