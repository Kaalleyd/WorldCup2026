            <div style={{display:"flex",gap:7,marginBottom:14}}>
              {[["scorers","🥅 Top Buteurs"],["motm","🏆 Homme du Match"]].map(([v,l])=>(
                <button key={v} onClick={()=>setSec(v)} style={{padding:"5px 14px",borderRadius:20,border:"1px solid",borderColor:sec===v?"#c89520":"#1e2d45",background:sec===v?"rgba(200,149,32,.13)":"transparent",color:sec===v?"#c89520":"#64748b",fontSize:11,cursor:"pointer",fontWeight:sec===v?700:400}}>{l}</button>
              ))}
            </div>
            {sec==="scorers"&&(
              <div style={{background:"#0d1b2e",borderRadius:9,overflow:"hidden",border:"1px solid #1e2d45"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:"#0f2040",color:"#2d3f55",fontSize:10,textTransform:"uppercase"}}>
                    <th style={{padding:"8px 11px",textAlign:"left"}}>#</th>
                    <th style={{padding:"8px 11px",textAlign:"left"}}>Joueur</th>
                    <th style={{padding:"8px 11px",textAlign:"left"}}>Équipe</th>
                    <th style={{padding:"8px 7px",textAlign:"center",color:"#c89520"}}>⚽ Buts</th>
                  </tr></thead>
                  <tbody>
                    {top.map((sc,i)=>(
                      <tr key={i} style={{borderTop:"1px solid #0a1320",background:i===0?"rgba(200,149,32,.07)":i<3?"rgba(200,149,32,.03)":"transparent"}}>
                        <td style={{padding:"10px 11px",fontSize:12,color:i<3?"#c89520":"#475569",fontWeight:700}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</td>
                        <td style={{padding:"10px 11px",fontSize:13,fontWeight:600}}>{sc.name}</td>
                        <td style={{padding:"10px 11px",fontSize:13}}>{F[sc.team]||"🏳"} {N[sc.team]||sc.team}</td>
                        <td style={{padding:"10px 7px",textAlign:"center",fontSize:16,fontWeight:900,color:"#c89520"}}>{sc.goals}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
            {sec==="motm"&&(
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {done.map((m,i)=>{
                  const k=`${m.h}|${m.a}`,motm=MOTM[k]||"—",rH=res(m.hs,m.as,true),rA=res(m.hs,m.as,false);
                  return(
                    <div key={i} style={{background:"#0d1b2e",border:"1px solid #1e2d45",borderRadius:8,padding:"9px 13px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,flex:2,minWidth:190}}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:VC[rH],flexShrink:0}}/>
                        <span style={{fontSize:11,color:"#94a3b8"}}>{F[m.h]||"🏳"} {N[m.h]||m.h}</span>
                        <span style={{fontSize:13,fontWeight:800,color:"#fff"}}>{m.hs}-{m.as}</span>
                        <span style={{fontSize:11,color:"#94a3b8"}}>{N[m.a]||m.a} {F[m.a]||"🏳"}</span>
                        <span style={{width:7,height:7,borderRadius:"50%",background:VC[rA],flexShrink:0}}/>
                      </div>
                      <div style={{flex:1,display:"flex",alignItems:"center",gap:5}}>
                        <span>🏆</span>
                        <span style={{fontSize:11.5,color:motm==="—"?"#2d3f55":"#c89520",fontWeight:motm==="—"?400:700}}>{motm}</span>
                      </div>
                      <div style={{fontSize:9,color:"#2d3f55"}}>{new Date(m.d+"T12:00:00Z").toLocaleDateString("fr-FR",{day:"numeric",month:"short"})} · Gr.{m.gr}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </main>
    </div>
  );
}

function MC({m}){
  const{h,a,hs,as:as_,st,gr,g=[],t,p}=m;
  const iF=st==="final",iL=st==="live",iS=st==="scheduled",iC=h==="CIV"||a==="CIV";
  const rH=iF?res(hs,as_,true):null,rA=iF?res(hs,as_,false):null;
  const hG=g.filter(x=>x.s==="H"),aG=g.filter(x=>x.s==="A");
  const gs=arr=>arr.map(g=>g.n&&g.m?`${g.n} ${g.m}'`:g.n?g.n:g.m?`${g.m}'`:"⚽");
  return(
    <div className="mc" style={{background:iC?"rgba(255,140,0,.055)":"#0d1b2e",border:`1px solid ${iL?"#ef4444":iC?"rgba(255,140,0,.22)":"#1e2d45"}`,borderRadius:9,padding:"9px 11px",marginBottom:5}}>
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <span style={{background:"#0f2040",color:"#475569",fontSize:9,fontWeight:700,padding:"2px 5px",borderRadius:4,minWidth:18,textAlign:"center",flexShrink:0}}>{gr}</span>
        <div style={{flex:1,textAlign:"right",minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5}}>
            <span style={{fontSize:12.5,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:iC&&h==="CIV"?"#fb923c":"#e2e8f0"}}>{F[h]||"🏳"} {N[h]||h}</span>
            {rH&&<span style={{width:8,height:8,borderRadius:"50%",background:VC[rH],display:"inline-block",flexShrink:0}}/>}
          </div>
        </div>
        <div style={{minWidth:56,textAlign:"center",fontSize:20,fontWeight:900,letterSpacing:2,color:iF?"#fff":iL?"#ef4444":"#1e3a5f"}}>{iF||iL?`${hs} - ${as_}`:"·-·"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            {rA&&<span style={{width:8,height:8,borderRadius:"50%",background:VC[rA],display:"inline-block",flexShrink:0}}/>}
            <span style={{fontSize:12.5,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:iC&&a==="CIV"?"#fb923c":"#e2e8f0"}}>{N[a]||a} {F[a]||"🏳"}</span>
          </div>
        </div>
        <div style={{minWidth:50,textAlign:"right",flexShrink:0}}>
          {iL&&<span style={{background:"#ef4444",color:"#fff",fontSize:9,padding:"2px 6px",borderRadius:4,fontWeight:700,animation:"pulse 1.2s infinite"}}>LIVE</span>}
          {iF&&<span style={{color:"#2d3f55",fontSize:10}}>Terminé</span>}
          {iS&&<div><div style={{color:"#64748b",fontSize:10,fontWeight:600}}>{t} GMT</div>{p&&<div style={{fontSize:9,color:"#2d3f55"}}>{p.h}%/{p.a}%</div>}</div>}
        </div>
      </div>
      {iF&&g.length>0&&(
        <div style={{display:"flex",marginTop:6,gap:8,paddingTop:6,borderTop:"1px solid #0d1525"}}>
          <div style={{flex:1,textAlign:"right"}}>{gs(hG).map((s,i)=><div key={i} style={{fontSize:10,color:"#4b6280"}}>⚽ {s}</div>)}</div>
          <div style={{width:1,background:"#1e2d45",flexShrink:0}}/>
          <div style={{flex:1}}>{gs(aG).map((s,i)=><div key={i} style={{fontSize:10,color:"#4b6280"}}>⚽ {s}</div>)}</div>
        </div>
      )}
    </div>
  );
}

function GC({group,teams}){
  return(
    <div style={{background:"#0d1b2e",border:"1px solid #1e2d45",borderRadius:11,padding:13}}>
      <div style={{fontWeight:800,fontSize:13,color:"#c89520",letterSpacing:2,marginBottom:9,paddingBottom:7,borderBottom:"1px solid #1e2d45"}}>GROUPE {group}</div>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{color:"#2d3f55",fontSize:9.5,textTransform:"uppercase",letterSpacing:1}}>
          <th style={{textAlign:"left",paddingBottom:3}}></th>
          {["J","G","N","P","Pts"].map(h=><th key={h} style={{width:22,textAlign:"center",paddingBottom:3}}>{h}</th>)}
        </tr></thead>
        <tbody>
          {teams.map((tm,i)=>{const c=tm.t||tm.team,iC=c==="CIV",q=i<2,p=(tm.w||0)+(tm.d||0)+(tm.l||0);return(
            <tr key={c} style={{borderTop:"1px solid #0a1320",background:iC?"rgba(255,140,0,.07)":q?"rgba(200,149,32,.04)":"transparent"}}>
              <td style={{padding:"5.5px 2px",fontSize:11.5,display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:9,fontWeight:700,color:q?"#4ade80":"#2d3f55",width:10,textAlign:"center"}}>{i+1}</span>
                {F[c]||"🏳"} <span style={{color:iC?"#fb923c":"#e2e8f0"}}>{N[c]||c}</span>
              </td>
              <td style={{textAlign:"center",fontSize:11,color:"#64748b"}}>{p}</td>
              <td style={{textAlign:"center",fontSize:11,color:"#4ade80"}}>{tm.w||0}</td>
              <td style={{textAlign:"center",fontSize:11,color:"#818cf8"}}>{tm.d||0}</td>
              <td style={{textAlign:"center",fontSize:11,color:"#f87171"}}>{tm.l||0}</td>
              <td style={{textAlign:"center",fontSize:12,fontWeight:800,color:"#c89520"}}>{tm.pts||0}</td>
            </tr>
          );})}
        </tbody>
      </table>
    </div>
  );
}

function SF({group,teams}){
  return(
    <div style={{marginBottom:16}}>
      <div style={{fontWeight:800,fontSize:11,color:"#c89520",textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Groupe {group}</div>
      <div style={{background:"#0d1b2e",borderRadius:8,overflow:"hidden",border:"1px solid #1e2d45"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:"#0f2040",color:"#2d3f55",fontSize:10,textTransform:"uppercase",letterSpacing:1}}>
            {["#","Équipe","J","G","N","P","Pts"].map(h=><th key={h} style={{padding:h==="Équipe"?"8px 11px":"7px 5px",textAlign:h==="Équipe"?"left":"center",color:h==="Pts"?"#c89520":"#2d3f55"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {teams.map((tm,i)=>{const c=tm.t||tm.team,iC=c==="CIV",q=i<2,p=(tm.w||0)+(tm.d||0)+(tm.l||0);return(
              <tr key={c} style={{borderTop:"1px solid #0a1320",background:iC?"rgba(255,140,0,.05)":q?"rgba(74,222,128,.03)":"transparent"}}>
                <td style={{padding:"9px 11px",color:q?"#4ade80":"#2d3f55",fontWeight:700,fontSize:12}}>{i+1}</td>
                <td style={{padding:"9px 11px",fontSize:13}}>{F[c]||"🏳"} <span style={{color:iC?"#fb923c":"#e2e8f0"}}>{N[c]||c}</span></td>
                <td style={{textAlign:"center",fontSize:12,color:"#64748b",padding:"9px 5px"}}>{p}</td>
                <td style={{textAlign:"center",fontSize:12,color:"#4ade80",padding:"9px 5px"}}>{tm.w||0}</td>
                <td style={{textAlign:"center",fontSize:12,color:"#818cf8",padding:"9px 5px"}}>{tm.d||0}</td>
                <td style={{textAlign:"center",fontSize:12,color:"#f87171",padding:"9px 5px"}}>{tm.l||0}</td>
                <td style={{textAlign:"center",fontSize:13,fontWeight:800,color:"#c89520",padding:"9px 5px"}}>{tm.pts||0}</td>
              </tr>
            );})}
          </tbody>
        </table>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
